<div class="flex items-center justify-center h-screen bg-gray-100">
  <!-- Left: Image -->
  <div class="hidden w-1/2 h-screen lg:block">
    <img
      src="../../../assets/employee-login.jpg"
      alt="Placeholder Image"
      class="object-cover w-full h-full"
    />
  </div>
  <!-- Right: Login Form -->
  <div class="w-full p-8 lg:p-36 md:p-52 sm:20 lg:w-1/2">
    <h1 class="mb-4 text-2xl font-semibold">Login</h1>
    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <!-- Username Input -->
      <div class="mb-4">
        <label for="username" class="block text-gray-600">Username</label>
        <input
          type="text"
          id="username"
          name="username"
          formControlName="username"
          class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:border-blue-500"
          autocomplete="off"
        />
        <div
          *ngIf="
            (!username?.valid && (username?.dirty || username?.touched)) ||
            submitted
          "
        >
          <small
            class="text-red-800"
            [hidden]="!username?.errors?.['required']"
          >
            Username is required
          </small>
        </div>
      </div>
      <!-- Password Input -->
      <div class="mb-4">
        <label for="password" class="block text-gray-600">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          formControlName="password"
          class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:border-blue-500"
          autocomplete="off"
        />
        <div
          *ngIf="
            (!password?.valid && (password?.dirty || password?.touched)) ||
            submitted
          "
        >
          <small
            class="text-red-800"
            [hidden]="!username?.errors?.['required']"
          >
            Password is required
          </small>
        </div>
      </div>
      <!-- Remember Me Checkbox -->
      <div class="flex items-center mb-4">
        <input
          type="checkbox"
          id="remember"
          name="remember"
          class="text-blue-500"
        />
        <label for="remember" class="ml-2 text-gray-600">Remember Me</label>
      </div>
      <!-- Forgot Password Link -->
      <div class="mb-6 text-blue-500">
        <a href="#" class="hover:underline">Forgot Password?</a>
      </div>
      <!-- Login Button -->
      <button
        type="submit"
        [disabled]="loading"
        class="w-full px-4 py-2 font-semibold text-white bg-blue-500 rounded-md hover:bg-blue-600"
      >
        Login
      </button>
    </form>
    <!-- Sign up  Link -->
    <div class="mt-6 text-center text-blue-500 cursor-pointer">
      <div class="hover:underline" [routerLink]="['/auth/register']">
        Sign up Here
      </div>
    </div>
  </div>
</div>
