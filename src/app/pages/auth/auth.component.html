<p class="underline font-normal">auth works!</p>

<h1 class="text-3xl font-bold underline">Hello world!</h1>
<!--Using ng-option and for loop-->
<ng-select [(ngModel)]="selectedCar">
  <ng-option *ngFor="let car of cars" [value]="car.id">{{
    car.name
  }}</ng-option>
</ng-select>

<!--Using items input-->
<ng-select
  [items]="cars"
  bindLabel="name"
  bindValue="id"
  [(ngModel)]="selectedCar"
>
</ng-select>
